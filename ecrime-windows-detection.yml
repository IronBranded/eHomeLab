title: ECrime — PowerShell Encoded Command Execution
id: e4b6d2a1-3f7c-4e8a-b2d1-9f6c3a5e8b7d
status: stable
description: Detects PowerShell execution with encoded command argument — common
  for initial access payloads, C2 beaconing, and lateral movement
author: ecrime-homelab
date: 2024-01-01
modified: 2024-01-01
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - ' -enc '
      - ' -EncodedCommand '
      - ' -e '
  condition: selection
falsepositives:
  - Some legitimate admin scripts use encoded commands
level: high
tags:
  - attack.execution
  - attack.t1059.001

---

title: ECrime — LSASS Memory Access by Non-System Process
id: a3c7e5f2-8b4d-4f9a-c1e7-2d5b8f3a6c9e
status: stable
description: Detects non-system processes opening a handle to LSASS memory —
  indicator of credential dumping (Mimikatz, ProcDump, etc.)
author: ecrime-homelab
date: 2024-01-01
logsource:
  product: windows
  category: process_access
detection:
  selection:
    TargetImage|endswith: '\lsass.exe'
    GrantedAccess|contains:
      - '0x1010'
      - '0x1038'
      - '0x143a'
      - '0x10'
  filter:
    SourceImage|startswith:
      - 'C:\Windows\System32\'
      - 'C:\Windows\SysWOW64\'
  condition: selection and not filter
falsepositives:
  - Legitimate security products (AV, EDR)
level: critical
tags:
  - attack.credential_access
  - attack.t1003.001

---

title: ECrime — Volume Shadow Copy Deletion
id: f1d9b3c6-7a2e-4d8f-b5c3-1e4a7f2b9d6c
status: stable
description: Detects deletion of volume shadow copies — a common ransomware
  anti-recovery technique
author: ecrime-homelab
date: 2024-01-01
logsource:
  product: windows
  category: process_creation
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains: 'delete'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains:
      - 'shadowcopy'
      - 'delete'
  condition: selection_vssadmin or selection_wmic
falsepositives:
  - Legitimate backup software cleanup
level: critical
tags:
  - attack.impact
  - attack.t1490

---

title: ECrime — Suspicious Scheduled Task Creation via schtasks
id: b8e4f2a7-5c1d-4b9e-d3f7-6a2c5e8b1d4f
status: stable
description: Detects scheduled task creation by non-admin processes — persistence
author: ecrime-homelab
date: 2024-01-01
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith: '\schtasks.exe'
    CommandLine|contains: '/create'
    CommandLine|contains:
      - 'powershell'
      - 'cmd'
      - 'wscript'
      - 'mshta'
  condition: selection
falsepositives:
  - Legitimate software installation
level: high
tags:
  - attack.persistence
  - attack.t1053.005
