---
# =============================================================================
# ECrime Homelab — Master Ansible Playbook
# =============================================================================
# Usage:
#   Full deploy:    ansible-playbook -i inventory.ini site.yml
#   Single phase:   ansible-playbook -i inventory.ini site.yml --tags phase2
#   Single role:    ansible-playbook -i inventory.ini site.yml --tags velociraptor
#   Verify only:    ansible-playbook -i inventory.ini site.yml --tags verify
#   Dry run:        ansible-playbook -i inventory.ini site.yml --check
# =============================================================================

- name: "PHASE 1 | Foundation — Common hardening on all hosts"
  hosts: all
  become: true
  gather_facts: true
  tags: [phase1, common, always]
  roles:
    - role: common
      tags: [common]

# -----------------------------------------------------------------------------

- name: "PHASE 1 | Foundation — ZFS Evidence NAS"
  hosts: nas
  become: true
  gather_facts: true
  tags: [phase1, nas, storage]
  roles:
